# Production KV id must be set via wrangler before production deploy.
name = "banmenh-kb"
main = "src/index.ts"
compatibility_date = "2026-05-23"

[env.dev]
name = "banmenh-kb-dev"

[[env.dev.kv_namespaces]]
binding = "BANMENH_KB_DEV"
id = "70886bee025145cf8ff352bcfa0148b6"

[[env.dev.r2_buckets]]
binding = "TAROT_KB_R2"
bucket_name = "banmenh-tarot-kb-dev"

[env.production]
name = "banmenh-kb-prod"

[[env.production.kv_namespaces]]
binding = "BANMENH_KB_DEV"
id = "placeholder-prod-kv-id"

[[env.production.r2_buckets]]
binding = "TAROT_KB_R2"
bucket_name = "banmenh-tarot-kb-prod"
